resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:8081 https://ka-f.fontawesome.com; img-src 'self' data: https://res.cloudinary.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://ka-f.fontawesome.com; script-src 'self' https://kit.fontawesome.com https://cdn.jsdelivr.net; font-src 'self' data: https://ka-f.fontawesome.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        set $backend "backend:8081";

        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
