name: momo-store

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GO_VERSION: ${GO_VERSION:-1.22}
        ALPINE_VERSION: ${ALPINE_VERSION:-3.21}
        APP_VERSION: ${APP_VERSION:-local}
    image: ${BACKEND_IMAGE:-momo-store-backend:local}
    environment:
      PORT: "8081"
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
        NGINX_VERSION: ${NGINX_VERSION:-1.27-alpine}
        APP_VERSION: ${APP_VERSION:-local}
        VUE_APP_API_URL: ${VUE_APP_API_URL:-/api}
        VUE_PUBLIC_PATH: ${VUE_PUBLIC_PATH:-/}
    image: ${FRONTEND_IMAGE:-momo-store-frontend:local}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
