name: momo-store

x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-runtime-limits: &runtime-limits
  cpus: "0.50"
  mem_limit: 128m
  pids_limit: 128

services:
  backend:
    <<: [*security, *runtime-limits]
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GO_VERSION: ${GO_VERSION:-1.22}
        ALPINE_VERSION: ${ALPINE_VERSION:-3.21}
        APP_VERSION: ${APP_VERSION:-local}
    image: ${BACKEND_IMAGE:-momo-store-backend:local}
    environment:
      PORT: "8081"
    expose:
      - "8081"
    networks:
      - backend_net
    volumes:
      - backend-data:/var/lib/momo-store:rw
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  backend-gateway:
    <<: [*security, *runtime-limits]
    image: nginxinc/nginx-unprivileged:${NGINX_VERSION:-1.27-alpine}
    volumes:
      - ./deploy/nginx/backend-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    networks:
      - public_net
      - backend_net
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    <<: [*security, *runtime-limits]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
        NGINX_VERSION: ${NGINX_VERSION:-1.27-alpine}
        APP_VERSION: ${APP_VERSION:-local}
        VUE_APP_API_URL: ${VUE_APP_API_URL:-/api}
        VUE_PUBLIC_PATH: ${VUE_PUBLIC_PATH:-/}
    image: ${FRONTEND_IMAGE:-momo-store-frontend:local}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:8080"
    networks:
      - public_net
      - backend_net
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend-dev:
    profiles:
      - dev
    <<: *security
    image: node:${NODE_VERSION:-20}-alpine
    working_dir: /app
    user: node
    command: sh -c "npm ci --no-audit --no-fund && npm run serve -- --host 0.0.0.0 --port 8080"
    environment:
      NODE_OPTIONS: --openssl-legacy-provider
      VUE_APP_API_URL: ${VUE_APP_API_URL:-http://localhost:8081}
      VUE_PUBLIC_PATH: /
    depends_on:
      backend-gateway:
        condition: service_healthy
    ports:
      - "${FRONTEND_DEV_PORT:-8080}:8080"
    networks:
      - public_net
    volumes:
      - ./frontend:/app:rw
      - frontend-node-modules:/app/node_modules:rw
    restart: unless-stopped

networks:
  public_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true

volumes:
  backend-data:
  frontend-node-modules:
